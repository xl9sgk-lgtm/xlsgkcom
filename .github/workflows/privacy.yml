name: Update Privacy News


on:

  schedule:

    # 每天北京时间9点

    - cron: "0 1 * * *"


  workflow_dispatch:



jobs:


  update:


    runs-on: ubuntu-latest


    steps:


    - name: Checkout

      uses: actions/checkout@v4



    - name: Setup Python

      uses: actions/setup-python@v5

      with:

        python-version: "3.x"



    - name: Install

      run:

        pip install -r requirements.txt



    - name: Update README

      run:

        python update_privacy_news.py



    - name: Commit


      run: |


        git config user.name github-actions

        git config user.email github-actions@github.com


        git add README.md


        git commit -m "update privacy news" || exit 0


        git push
